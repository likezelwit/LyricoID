<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyric.o - Song Lyrics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'roboto': ['Roboto', 'sans-serif'] },
                    colors: {
                        'lyric-bg': '#faf8f5',
                        'lyric-card': '#ffffff',
                        'lyric-text': '#2d2a26',
                        'lyric-secondary': '#7a756d',
                        'lyric-light': '#b5b0a8',
                        'lyric-accent': '#c4a882',
                        'lyric-accent-dark': '#a8896a',
                        'lyric-border': '#e8e4df',
                        'lyric-box-bg': '#f5f2ed',
                        'lyric-hover': '#f9f7f4',
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #faf8f5; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4d0ca; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #b5b0a8; }
        .lyrics-scroll::-webkit-scrollbar { width: 5px; }
        .lyrics-scroll::-webkit-scrollbar-thumb { background: #d4d0ca; border-radius: 3px; }
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #2d2a26; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 9999; transition: transform 0.3s ease; pointer-events: none; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .song-item { cursor: pointer; transition: all 0.2s ease; }
        .song-item:hover { background: #f9f7f4; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
        .song-item.active { background: #f5f2ed; box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
        .detail-panel { max-height: 0; overflow: hidden; transition: max-height 0.5s ease, opacity 0.3s ease; opacity: 0; }
        .detail-panel.open { max-height: 2000px; opacity: 1; }
        .skeleton { background: #e8e4df; border-radius: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="font-roboto min-h-screen">

    <div id="toast" class="toast"></div>

    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-sm border-b border-lyric-border sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="../../index.html" class="flex items-center gap-2 text-lyric-text no-underline hover:opacity-70 transition-opacity">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    <span class="font-medium text-sm hidden sm:inline">Kembali</span>
                </a>
                <div class="w-px h-5 bg-lyric-border hidden sm:block"></div>
                <h1 class="text-base font-medium text-lyric-text flex items-center gap-2">
                    <i data-lucide="music-2" class="w-4 h-4 text-lyric-accent"></i>
                    Song Lyrics
                </h1>
            </div>
            <a href="https://www.youtube.com/channel/UCswjQj3xgq83dYAxJvJhWgQ" target="_blank" class="flex items-center gap-2 text-lyric-accent-dark hover:text-lyric-accent text-sm font-medium no-underline transition-colors">
                <i data-lucide="external-link" class="w-4 h-4"></i>
                <span class="hidden sm:inline">YouTube</span>
            </a>
        </div>
    </header>

    <!-- Search -->
    <div class="max-w-5xl mx-auto px-4 sm:px-6 pt-6">
        <div class="flex items-center bg-white rounded-xl border border-lyric-border overflow-hidden focus-within:border-lyric-accent focus-within:shadow-sm transition-all">
            <div class="pl-4 flex-shrink-0">
                <i data-lucide="search" class="w-4 h-4 text-lyric-light"></i>
            </div>
            <input id="searchInput" type="text" placeholder="Cari judul lagu atau penulis..." class="flex-1 h-11 px-3 text-sm outline-none bg-transparent text-lyric-text placeholder:text-lyric-light" oninput="filterSongs(this.value)">
            <button id="clearSearch" onclick="clearSearchInput()" class="hidden pr-3 text-lyric-light hover:text-lyric-text transition-colors">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>
    </div>

    <!-- Main -->
    <main class="max-w-5xl mx-auto px-4 sm:px-6 py-6">
        <div class="mb-6">
            <h2 class="text-2xl font-light text-lyric-text tracking-tight">Koleksi Lirik</h2>
            <p class="text-sm text-lyric-secondary mt-1">Klik lagu untuk melihat lirik lengkap</p>
        </div>

        <!-- Song List -->
        <div id="songList" class="space-y-3">
            <div class="bg-white rounded-xl p-4 flex items-center gap-4"><div class="skeleton w-16 h-16 rounded-lg flex-shrink-0"></div><div class="flex-1"><div class="skeleton h-4 w-2/3 mb-2"></div><div class="skeleton h-3 w-1/3"></div></div></div>
            <div class="bg-white rounded-xl p-4 flex items-center gap-4"><div class="skeleton w-16 h-16 rounded-lg flex-shrink-0"></div><div class="flex-1"><div class="skeleton h-4 w-2/3 mb-2"></div><div class="skeleton h-3 w-1/3"></div></div></div>
            <div class="bg-white rounded-xl p-4 flex items-center gap-4"><div class="skeleton w-16 h-16 rounded-lg flex-shrink-0"></div><div class="flex-1"><div class="skeleton h-4 w-2/3 mb-2"></div><div class="skeleton h-3 w-1/3"></div></div></div>
        </div>

        <div id="emptyState" class="hidden text-center py-20">
            <i data-lucide="file-text" class="w-16 h-16 text-lyric-light mx-auto mb-4"></i>
            <p class="text-lyric-secondary text-lg">Belum ada lirik</p>
            <p class="text-lyric-light text-sm mt-1">Lirik akan muncul setelah ditambahkan oleh staff.</p>
        </div>

        <div id="noResults" class="hidden text-center py-20">
            <i data-lucide="search-x" class="w-16 h-16 text-lyric-light mx-auto mb-4"></i>
            <p class="text-lyric-secondary text-lg">Tidak ditemukan</p>
            <p class="text-lyric-light text-sm mt-1">Coba kata kunci lain.</p>
        </div>
    </main>

    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyB5tXCot1h83ZePjiX3kVvYfO0bDs8teSs",
            authDomain: "dwellidoki-cb4cd.firebaseapp.com",
            projectId: "dwellidoki-cb4cd",
            storageBucket: "dwellidoki-cb4cd.firebasestorage.app",
            messagingSenderId: "677449362018",
            appId: "1:677449362018:web:834f81d2f55c27b139ff3b",
            measurementId: "G-MLGPGY8Y1G"
        });
        const db = firebase.firestore();
        let allSongs = [];
        let filteredSongs = [];
        let activeIndex = -1;

        lucide.createIcons();

        function slugify(text) {
            if (!text) return 'unknown';
            return text.toLowerCase().replace(/[^a-z0-9\s-]/g, '').replace(/[\s]+/g, '-').replace(/(^-|-$)/g, '');
        }

        function generateSongUrl(song) {
            const nameSlug = slugify(song.title);
            const writerSlug = slugify(song.songWriter);
            const code = song.id || Math.random().toString(36).substring(2, 10);
            return '/Lyric.o/SongLyrics/' + nameSlug + '/' + writerSlug + '/' + code;
        }

        function formatDate(d) {
            if (!d) return '-';
            const date = new Date(d);
            if (isNaN(date)) return d;
            return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function copyLyrics(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('Lirik berhasil disalin!');
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('Lirik berhasil disalin!');
            });
        }

        function clearSearchInput() {
            document.getElementById('searchInput').value = '';
            document.getElementById('clearSearch').classList.add('hidden');
            filterSongs('');
        }

        function filterSongs(query) {
            const q = query.toLowerCase().trim();
            const clearBtn = document.getElementById('clearSearch');
            const noResults = document.getElementById('noResults');

            if (q) {
                clearBtn.classList.remove('hidden');
            } else {
                clearBtn.classList.add('hidden');
            }

            filteredSongs = allSongs.filter(s =>
                (s.title || '').toLowerCase().includes(q) ||
                (s.songWriter || '').toLowerCase().includes(q)
            );

            // Close active panel if filtering
            if (activeIndex >= 0) {
                const prevPanel = document.getElementById('detail-' + activeIndex);
                const prevItem = document.getElementById('item-' + activeIndex);
                const prevChevron = document.getElementById('chevron-' + activeIndex);
                if (prevPanel) prevPanel.classList.remove('open');
                if (prevItem) prevItem.classList.remove('active');
                if (prevChevron) prevChevron.style.transform = 'rotate(0deg)';
                activeIndex = -1;
            }

            noResults.classList.add('hidden');

            if (!filteredSongs.length && allSongs.length) {
                noResults.classList.remove('hidden');
                document.getElementById('songList').innerHTML = '';
                lucide.createIcons();
                return;
            }

            renderSongList(filteredSongs);
        }

        function renderSongList(songs) {
            const list = document.getElementById('songList');
            const empty = document.getElementById('emptyState');

            if (!songs.length && !allSongs.length) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                lucide.createIcons();
                return;
            }

            empty.classList.add('hidden');

            list.innerHTML = songs.map((s, i) => {
                const realIndex = allSongs.indexOf(s);
                return `
                    <div id="item-${realIndex}" class="song-item bg-white rounded-xl p-4 flex items-center gap-4" onclick="toggleSong(${realIndex})">
                        <img src="${s.imageUrl || 'https://picsum.photos/seed/lyric'+realIndex+'/128/128'}" alt="${s.title}" class="w-16 h-16 rounded-lg object-cover flex-shrink-0 bg-lyric-box-bg" onerror="this.src='https://picsum.photos/seed/lfallback'+realIndex+'/128/128'">
                        <div class="flex-1 min-w-0">
                            <h3 class="text-sm font-medium text-lyric-text truncate">${s.title || '-'}</h3>
                            <p class="text-xs text-lyric-secondary mt-0.5">${s.songWriter || 'Unknown Artist'}</p>
                            <div class="flex items-center gap-3 mt-1">
                                ${s.duration ? `<span class="text-xs text-lyric-light">${s.duration}</span>` : ''}
                                ${s.releaseDate ? `<span class="text-xs text-lyric-light">${formatDate(s.releaseDate)}</span>` : ''}
                            </div>
                        </div>
                        <div class="flex-shrink-0 text-lyric-light">
                            <i data-lucide="chevron-down" class="w-5 h-5 transition-transform" id="chevron-${realIndex}" style="transform:rotate(0deg)"></i>
                        </div>
                    </div>
                    <div id="detail-${realIndex}" class="detail-panel">
                        <div class="bg-white rounded-xl border border-lyric-border mx-2 mb-3 overflow-hidden fade-in">
                            <div class="p-5">
                                <div class="flex flex-col sm:flex-row gap-5">
                                    <img src="${s.imageUrl || 'https://picsum.photos/seed/detail'+realIndex+'/200/200'}" alt="${s.title}" class="w-full sm:w-40 h-40 rounded-xl object-cover flex-shrink-0 bg-lyric-box-bg" onerror="this.src='https://picsum.photos/seed/dfallback'+realIndex+'/200/200'">
                                    <div class="flex-1 min-w-0">
                                        <h2 class="text-lg font-medium text-lyric-text mb-3">${s.title || '-'}</h2>
                                        <div class="grid grid-cols-2 gap-y-2 gap-x-4 text-sm">
                                            <div>
                                                <span class="text-lyric-light text-xs">Penulis Lagu</span>
                                                <p class="text-lyric-text text-sm">${s.songWriter || '-'}</p>
                                            </div>
                                            <div>
                                                <span class="text-lyric-light text-xs">Produsen</span>
                                                <p class="text-lyric-text text-sm">${s.producer || '-'}</p>
                                            </div>
                                            <div>
                                                <span class="text-lyric-light text-xs">Durasi</span>
                                                <p class="text-lyric-text text-sm">${s.duration || '-'}</p>
                                            </div>
                                            <div>
                                                <span class="text-lyric-light text-xs">Tanggal Rilis</span>
                                                <p class="text-lyric-text text-sm">${formatDate(s.releaseDate)}</p>
                                            </div>
                                            <div>
                                                <span class="text-lyric-light text-xs">Sumber</span>
                                                <p class="text-lyric-text text-sm">${s.source || '-'}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                ${s.lyrics ? `
                                <div class="mt-5">
                                    <div class="flex items-center justify-between mb-3">
                                        <h3 class="text-sm font-medium text-lyric-text flex items-center gap-2">
                                            <i data-lucide="file-text" class="w-4 h-4 text-lyric-accent"></i>
                                            Lirik
                                        </h3>
                                        <button onclick="event.stopPropagation();copyLyrics(allSongs[${realIndex}].lyrics)" class="flex items-center gap-1.5 text-xs text-lyric-accent-dark hover:text-lyric-accent transition-colors bg-lyric-box-bg px-3 py-1.5 rounded-full">
                                            <i data-lucide="copy" class="w-3 h-3"></i>
                                            Salin
                                        </button>
                                    </div>
                                    <div class="lyrics-scroll bg-lyric-box-bg rounded-xl p-5 max-h-[400px] overflow-y-auto text-sm text-lyric-text leading-relaxed whitespace-pre-line border border-lyric-border">${s.lyrics}</div>
                                </div>
                                ` : `
                                <div class="mt-5 text-center py-6 text-lyric-light">
                                    <i data-lucide="file-x" class="w-8 h-8 mx-auto mb-2"></i>
                                    <p class="text-sm">Lirik belum tersedia</p>
                                </div>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            lucide.createIcons();
        }

        function toggleSong(index) {
            if (activeIndex === index) {
                const panel = document.getElementById('detail-' + index);
                const item = document.getElementById('item-' + index);
                const chevron = document.getElementById('chevron-' + index);
                panel.classList.remove('open');
                item.classList.remove('active');
                if (chevron) chevron.style.transform = 'rotate(0deg)';
                activeIndex = -1;
                history.pushState({}, '', window.location.pathname);
                return;
            }

            // Close previous
            if (activeIndex >= 0) {
                const prevPanel = document.getElementById('detail-' + activeIndex);
                const prevItem = document.getElementById('item-' + activeIndex);
                const prevChevron = document.getElementById('chevron-' + activeIndex);
                if (prevPanel) prevPanel.classList.remove('open');
                if (prevItem) prevItem.classList.remove('active');
                if (prevChevron) prevChevron.style.transform = 'rotate(0deg)';
            }

            // Open new
            const panel = document.getElementById('detail-' + index);
            const item = document.getElementById('item-' + index);
            const chevron = document.getElementById('chevron-' + index);
            if (panel) panel.classList.add('open');
            if (item) item.classList.add('active');
            if (chevron) chevron.style.transform = 'rotate(180deg)';
            activeIndex = index;

            // Change URL
            const song = allSongs[index];
            const newUrl = generateSongUrl(song);
            history.pushState({ songIndex: index }, '', newUrl);

            // Scroll into view
            setTimeout(() => {
                if (panel) {
                    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }, 100);
        }

        // Handle back/forward
        window.addEventListener('popstate', function(e) {
            if (e.state && e.state.songIndex !== undefined) {
                // Re-render list first to get fresh DOM elements
                renderSongList(filteredSongs);
                setTimeout(() => { toggleSong(e.state.songIndex); }, 50);
            } else {
                if (activeIndex >= 0) {
                    const panel = document.getElementById('detail-' + activeIndex);
                    const item = document.getElementById('item-' + activeIndex);
                    const chevron = document.getElementById('chevron-' + activeIndex);
                    if (panel) panel.classList.remove('open');
                    if (item) item.classList.remove('active');
                    if (chevron) chevron.style.transform = 'rotate(0deg)';
                    activeIndex = -1;
                }
            }
        });

        // Parse URL on direct visit and auto-open song
        function initFromUrl() {
            const path = window.location.pathname;
            // Match: /Lyric.o/SongLyrics/name-slug/writer-slug/code
            const match = path.match(/\/Lyric\.o\/SongLyrics\/([^/]+)\/([^/]+)\/([^/]+)/);
            if (match) {
                const code = match[3];
                const idx = allSongs.findIndex(s => s.id === code);
                if (idx >= 0) {
                    setTimeout(() => { toggleSong(idx); }, 200);
                }
            }
        }

        // Fetch songs
        db.collection('songs').orderBy('createdAt', 'desc').get().then(snap => {
            allSongs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            filteredSongs = [...allSongs];
            renderSongList(filteredSongs);
            initFromUrl();
        }).catch(err => {
            console.error(err);
            document.getElementById('songList').innerHTML = `<div class="text-center py-10"><p class="text-red-400 text-sm">Gagal memuat data.</p></div>`;
        });

        let toastTimeout;
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
