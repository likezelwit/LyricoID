<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyric.o - Song Lyrics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'roboto': ['Roboto', 'sans-serif'],
                        'playfair': ['Playfair Display', 'serif'],
                    },
                    colors: {
                        'lyric-bg': '#faf8f5',
                        'lyric-card': '#ffffff',
                        'lyric-text': '#2d2a26',
                        'lyric-secondary': '#7a756d',
                        'lyric-light': '#b5b0a8',
                        'lyric-accent': '#c4a882',
                        'lyric-accent-dark': '#a8896a',
                        'lyric-border': '#e8e4df',
                        'lyric-box-bg': '#f5f2ed',
                        'lyric-hover': '#f9f7f4',
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #faf8f5; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4d0ca; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #b5b0a8; }
        .lyrics-scroll::-webkit-scrollbar { width: 5px; }
        .lyrics-scroll::-webkit-scrollbar-thumb { background: #d4d0ca; border-radius: 3px; }
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #2d2a26; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 9999; transition: transform 0.3s ease; pointer-events: none; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .song-item { cursor: pointer; transition: all 0.25s ease; border: 1px solid transparent; }
        .song-item:hover { background: #f9f7f4; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.05); border-color: #e8e4df; }
        .song-item.active { background: #f5f2ed; box-shadow: 0 4px 16px rgba(0,0,0,0.04); border-color: #d4cfc7; }
        .detail-panel { max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease, padding 0.35s ease; opacity: 0; padding: 0 24px; }
        .detail-panel.open { max-height: 3000px; opacity: 1; padding: 24px; }
        .skeleton { background: #e8e4df; border-radius: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .lyrics-text { font-family: 'Playfair Display', serif; font-size: 15px; line-height: 2; color: #2d2a26; letter-spacing: 0.01em; }
        .lyrics-text p { margin-bottom: 1em; }
        .copy-btn { transition: all 0.2s; }
        .copy-btn:hover { background: #c4a882; color: #fff; border-color: #c4a882; }
        .chevron-icon { transition: transform 0.3s ease; }
        .song-item.active .chevron-icon { transform: rotate(180deg); }
        .decoration-line { height: 1px; background: linear-gradient(to right, transparent, #c4a882, transparent); }
        .no-lyrics-hint { font-style: italic; color: #b5b0a8; }
    </style>
</head>
<body class="font-roboto min-h-screen">

    <div id="toast" class="toast"></div>

    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-sm border-b border-lyric-border sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="../index.html" class="flex items-center gap-2 text-lyric-text no-underline hover:opacity-70 transition-opacity">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    <span class="font-medium text-sm hidden sm:inline">Kembali</span>
                </a>
                <div class="w-px h-5 bg-lyric-border hidden sm:block"></div>
                <h1 class="text-base font-medium text-lyric-text flex items-center gap-2">
                    <i data-lucide="music-2" class="w-4 h-4 text-lyric-accent"></i>
                    Song Lyrics
                </h1>
            </div>
            <a href="https://www.youtube.com/channel/UCswjQj3xgq83dYAxJvJhWgQ" target="_blank" class="flex items-center gap-2 text-lyric-accent-dark hover:text-lyric-accent text-sm font-medium no-underline transition-colors">
                <i data-lucide="external-link" class="w-4 h-4"></i>
                <span class="hidden sm:inline">YouTube</span>
            </a>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-5xl mx-auto px-4 sm:px-6 py-8">
        <div class="mb-8">
            <h2 class="text-2xl font-light text-lyric-text tracking-tight font-playfair">Koleksi Lirik</h2>
            <p class="text-sm text-lyric-secondary mt-1">Klik lagu untuk melihat lirik lengkap</p>
            <div class="decoration-line mt-4"></div>
        </div>

        <!-- Search -->
        <div class="mb-6">
            <div class="relative max-w-md">
                <i data-lucide="search" class="w-4 h-4 text-lyric-light absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none"></i>
                <input id="lyricSearch" type="text" placeholder="Cari judul lagu atau penulis..." class="w-full pl-10 pr-4 py-2.5 bg-white border border-lyric-border rounded-xl text-sm text-lyric-text outline-none focus:border-lyric-accent focus:shadow-sm transition-all placeholder:text-lyric-light" oninput="filterLyrics(this.value)">
            </div>
        </div>

        <!-- Song List -->
        <div id="songList" class="space-y-3">
            <div class="bg-white rounded-xl p-4 flex items-center gap-4"><div class="skeleton w-16 h-16 rounded-lg flex-shrink-0"></div><div class="flex-1"><div class="skeleton h-4 w-2/3 mb-2"></div><div class="skeleton h-3 w-1/3"></div></div></div>
            <div class="bg-white rounded-xl p-4 flex items-center gap-4"><div class="skeleton w-16 h-16 rounded-lg flex-shrink-0"></div><div class="flex-1"><div class="skeleton h-4 w-2/3 mb-2"></div><div class="skeleton h-3 w-1/3"></div></div></div>
            <div class="bg-white rounded-xl p-4 flex items-center gap-4"><div class="skeleton w-16 h-16 rounded-lg flex-shrink-0"></div><div class="flex-1"><div class="skeleton h-4 w-2/3 mb-2"></div><div class="skeleton h-3 w-1/3"></div></div></div>
        </div>

        <div id="emptyState" class="hidden text-center py-20">
            <i data-lucide="file-text" class="w-16 h-16 text-lyric-light mx-auto mb-4"></i>
            <p class="text-lyric-secondary text-lg">Belum ada lirik</p>
            <p class="text-lyric-light text-sm mt-1">Lirik akan muncul setelah ditambahkan oleh staff.</p>
        </div>

        <div id="noResults" class="hidden text-center py-16">
            <i data-lucide="search-x" class="w-14 h-14 text-lyric-light mx-auto mb-4"></i>
            <p class="text-lyric-secondary">Tidak ditemukan lagu yang cocok</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-lyric-border mt-12 py-8">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 text-center">
            <p class="text-xs text-lyric-light">Lyric.o — Setiap bait untuk menemani cerita Anda</p>
        </div>
    </footer>

    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyB5tXCot1h83ZePjiX3kVvYfO0bDs8teSs",
            authDomain: "dwellidoki-cb4cd.firebaseapp.com",
            projectId: "dwellidoki-cb4cd",
            storageBucket: "dwellidoki-cb4cd.firebasestorage.app",
            messagingSenderId: "677449362018",
            appId: "1:677449362018:web:834f81d2f55c27b139ff3b",
            measurementId: "G-MLGPGY8Y1G"
        });
        const db = firebase.firestore();
        let allSongs = [];
        let filteredSongs = [];
        let activeIndex = -1;

        lucide.createIcons();

        function getVideoId(url) {
            if (!url) return null;
            const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
            return m ? m[1] : null;
        }

        function formatDate(d) {
            if (!d) return '-';
            const date = new Date(d);
            if (isNaN(date)) return d;
            return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatLyrics(text) {
            if (!text) return '';
            // Konversi baris baru ke paragraf
            const lines = text.split('\n');
            let html = '';
            let currentParagraph = '';

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line === '') {
                    if (currentParagraph) {
                        html += '<p>' + escapeHtml(currentParagraph) + '</p>';
                        currentParagraph = '';
                    }
                } else {
                    if (currentParagraph) currentParagraph += '\n';
                    currentParagraph += line;
                }
            }
            if (currentParagraph) {
                html += '<p>' + escapeHtml(currentParagraph) + '</p>';
            }
            return html;
        }

        function copyLyrics(index) {
            const song = filteredSongs[index];
            if (!song || !song.lyrics) return;
            const text = song.lyrics;
            navigator.clipboard.writeText(text).then(() => {
                showToast('Lirik berhasil disalin!');
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('Lirik berhasil disalin!');
            });
        }

        function toggleSong(index) {
            if (activeIndex === index) {
                // Tutup panel yang aktif
                const panel = document.getElementById('detail-' + index);
                const item = document.getElementById('item-' + index);
                if (panel) panel.classList.remove('open');
                if (item) item.classList.remove('active');
                activeIndex = -1;
                return;
            }

            // Tutup panel sebelumnya
            if (activeIndex >= 0) {
                const prevPanel = document.getElementById('detail-' + activeIndex);
                const prevItem = document.getElementById('item-' + activeIndex);
                if (prevPanel) prevPanel.classList.remove('open');
                if (prevItem) prevItem.classList.remove('active');
            }

            // Buka panel baru
            const panel = document.getElementById('detail-' + index);
            const item = document.getElementById('item-' + index);
            if (panel) panel.classList.add('open');
            if (item) item.classList.add('active');
            activeIndex = index;

            // Scroll ke panel setelah animasi
            setTimeout(() => {
                if (panel) {
                    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }, 100);
        }

        function renderSongs(songs) {
            const list = document.getElementById('songList');
            const empty = document.getElementById('emptyState');
            const noResults = document.getElementById('noResults');

            // Reset active
            activeIndex = -1;

            if (allSongs.length === 0) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                noResults.classList.add('hidden');
                lucide.createIcons();
                return;
            }

            empty.classList.add('hidden');

            if (songs.length === 0) {
                list.innerHTML = '';
                noResults.classList.remove('hidden');
                lucide.createIcons();
                return;
            }

            noResults.classList.add('hidden');

            list.innerHTML = songs.map((s, i) => {
                const vid = getVideoId(s.youtubeLink);
                const hasLyrics = s.lyrics && s.lyrics.trim().length > 0;

                return `
                <div class="bg-white rounded-xl overflow-hidden">
                    <div id="item-${i}" class="song-item flex items-center gap-4 p-4" onclick="toggleSong(${i})">
                        <img src="${s.imageUrl || 'https://picsum.photos/seed/lyric'+i+'/128/128'}" alt="${escapeHtml(s.title)}" class="w-16 h-16 rounded-lg object-cover flex-shrink-0 bg-lyric-box-bg" loading="lazy" onerror="this.src='https://picsum.photos/seed/err'+i+'/128/128'">
                        <div class="flex-1 min-w-0">
                            <h3 class="text-sm font-medium text-lyric-text truncate">${escapeHtml(s.title || 'Tanpa Judul')}</h3>
                            <div class="flex items-center gap-2 mt-0.5">
                                ${s.songWriter ? `<span class="text-xs text-lyric-secondary truncate">${escapeHtml(s.songWriter)}</span>` : ''}
                                ${s.duration ? `<span class="text-xs text-lyric-light">· ${escapeHtml(s.duration)}</span>` : ''}
                            </div>
                            <div class="flex items-center gap-2 mt-1">
                                ${hasLyrics ? `<span class="inline-flex items-center gap-1 text-[10px] text-lyric-accent-dark bg-lyric-box-bg px-2 py-0.5 rounded-full"><i data-lucide="file-text" class="w-3 h-3"></i>Lirik</span>` : `<span class="inline-flex items-center gap-1 text-[10px] text-lyric-light bg-lyric-box-bg px-2 py-0.5 rounded-full"><i data-lucide="file-x" class="w-3 h-3"></i>Belum ada lirik</span>`}
                                ${vid ? `<span class="inline-flex items-center gap-1 text-[10px] text-red-500 bg-red-50 px-2 py-0.5 rounded-full"><i data-lucide="play-circle" class="w-3 h-3"></i>Video</span>` : ''}
                            </div>
                        </div>
                        <i data-lucide="chevron-down" class="w-5 h-5 text-lyric-light flex-shrink-0 chevron-icon"></i>
                    </div>
                    <div id="detail-${i}" class="detail-panel bg-lyric-box-bg border-t border-lyric-border">
                        <!-- Video -->
                        ${vid ? `
                        <div class="mb-5 rounded-xl overflow-hidden bg-black aspect-video max-w-lg">
                            <iframe src="https://www.youtube.com/embed/${vid}" class="w-full h-full" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                        </div>` : ''}

                        <!-- Info Grid -->
                        <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 mb-5 text-sm">
                            ${s.producer ? `<div><span class="text-xs text-lyric-light block">Produsen</span><p class="text-lyric-text mt-0.5">${escapeHtml(s.producer)}</p></div>` : ''}
                            ${s.releaseDate ? `<div><span class="text-xs text-lyric-light block">Tanggal Rilis</span><p class="text-lyric-text mt-0.5">${formatDate(s.releaseDate)}</p></div>` : ''}
                            ${s.source ? `<div><span class="text-xs text-lyric-light block">Sumber</span><p class="text-lyric-text mt-0.5">${escapeHtml(s.source)}</p></div>` : ''}
                        </div>

                        ${s.youtubeLink ? `
                        <div class="mb-5">
                            <a href="${s.youtubeLink}" target="_blank" class="inline-flex items-center gap-2 text-sm text-lyric-accent-dark hover:text-lyric-accent transition-colors">
                                <i data-lucide="external-link" class="w-4 h-4"></i>
                                Buka di YouTube
                            </a>
                        </div>` : ''}

                        <!-- Lirik -->
                        ${hasLyrics ? `
                        <div>
                            <div class="flex items-center justify-between mb-3">
                                <h4 class="text-sm font-medium text-lyric-text flex items-center gap-2">
                                    <i data-lucide="quote" class="w-4 h-4 text-lyric-accent"></i>
                                    Lirik
                                </h4>
                                <button onclick="event.stopPropagation(); copyLyrics(${i})" class="copy-btn flex items-center gap-1.5 text-xs text-lyric-accent-dark border border-lyric-accent/30 rounded-full px-3 py-1.5">
                                    <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                    Salin
                                </button>
                            </div>
                            <div class="decoration-line mb-4"></div>
                            <div class="lyrics-scroll max-h-[400px] overflow-y-auto pr-2 lyrics-text">
                                ${formatLyrics(s.lyrics)}
                            </div>
                        </div>` : `
                        <div class="text-center py-8">
                            <i data-lucide="file-text" class="w-10 h-10 text-lyric-light mx-auto mb-3"></i>
                            <p class="text-sm no-lyrics-hint">Lirik belum tersedia untuk lagu ini.</p>
                        </div>`}
                    </div>
                </div>
            `}).join('');

            lucide.createIcons();
        }

        function filterLyrics(query) {
            const q = query.toLowerCase().trim();
            if (!q) {
                filteredSongs = [...allSongs];
            } else {
                filteredSongs = allSongs.filter(s =>
                    (s.title || '').toLowerCase().includes(q) ||
                    (s.songWriter || '').toLowerCase().includes(q) ||
                    (s.producer || '').toLowerCase().includes(q)
                );
            }
            renderSongs(filteredSongs);
        }

        // Fetch songs — hanya yang punya lirik, atau semua? Tampilkan semua.
        db.collection('songs').orderBy('createdAt', 'desc').get().then(snap => {
            allSongs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            filteredSongs = [...allSongs];
            renderSongs(filteredSongs);
        }).catch(err => {
            console.error(err);
            document.getElementById('songList').innerHTML = `
                <div class="text-center py-12">
                    <p class="text-red-400 text-sm">Gagal memuat data. Pastikan aturan Firestore mengizinkan pembacaan.</p>
                </div>
            `;
        });

        let toastTimeout;
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
