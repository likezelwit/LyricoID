<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyric.o - Song Lyrics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'roboto': ['Roboto', 'sans-serif'] },
                    colors: {
                        'lyric-bg': '#faf8f5',
                        'lyric-card': '#ffffff',
                        'lyric-text': '#2d2a26',
                        'lyric-secondary': '#7a756d',
                        'lyric-light': '#b5b0a8',
                        'lyric-accent': '#c4a882',
                        'lyric-accent-dark': '#a8896a',
                        'lyric-border': '#e8e4df',
                        'lyric-box-bg': '#f5f2ed',
                        'lyric-hover': '#f9f7f4',
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #faf8f5; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4d0ca; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #b5b0a8; }
        .lyrics-scroll::-webkit-scrollbar { width: 5px; }
        .lyrics-scroll::-webkit-scrollbar-thumb { background: #d4d0ca; border-radius: 3px; }
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #2d2a26; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 9999; transition: transform 0.3s ease; pointer-events: none; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .song-item { cursor: pointer; transition: all 0.2s ease; }
        .song-item:hover { background: #f9f7f4; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
        .song-item.active { background: #f5f2ed; box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
        .detail-panel { max-height: 0; overflow: hidden; transition: max-height 0.5s ease, opacity 0.3s ease; opacity: 0; }
        .detail-panel.open { max-height: 2000px; opacity: 1; }
        .skeleton { background: #e8e4df; border-radius: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="font-roboto min-h-screen">

    <div id="toast" class="toast"></div>

    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-sm border-b border-lyric-border sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="../index.html" class="flex items-center gap-2 text-lyric-text no-underline hover:opacity-70 transition-opacity">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    <span class="font-medium text-sm hidden sm:inline">Kembali</span>
                </a>
                <div class="w-px h-5 bg-lyric-border hidden sm:block"></div>
                <h1 class="text-base font-medium text-lyric-text flex items-center gap-2">
                    <i data-lucide="music-2" class="w-4 h-4 text-lyric-accent"></i>
                    Song Lyrics
                </h1>
            </div>
            <a href="https://www.youtube.com/channel/UCswjQj3xgq83dYAxJvJhWgQ" target="_blank" class="flex items-center gap-2 text-lyric-accent-dark hover:text-lyric-accent text-sm font-medium no-underline transition-colors">
                <i data-lucide="external-link" class="w-4 h-4"></i>
                <span class="hidden sm:inline">YouTube</span>
            </a>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-5xl mx-auto px-4 sm:px-6 py-8">
        <div class="mb-8">
            <h2 class="text-2xl font-light text-lyric-text tracking-tight">Koleksi Lirik</h2>
            <p class="text-sm text-lyric-secondary mt-1">Klik lagu untuk melihat lirik lengkap</p>
        </div>

        <!-- Song List -->
        <div id="songList" class="space-y-3">
            <div class="bg-white rounded-xl p-4 flex items-center gap-4"><div class="skeleton w-16 h-16 rounded-lg flex-shrink-0"></div><div class="flex-1"><div class="skeleton h-4 w-2/3 mb-2"></div><div class="skeleton h-3 w-1/3"></div></div></div>
            <div class="bg-white rounded-xl p-4 flex items-center gap-4"><div class="skeleton w-16 h-16 rounded-lg flex-shrink-0"></div><div class="flex-1"><div class="skeleton h-4 w-2/3 mb-2"></div><div class="skeleton h-3 w-1/3"></div></div></div>
            <div class="bg-white rounded-xl p-4 flex items-center gap-4"><div class="skeleton w-16 h-16 rounded-lg flex-shrink-0"></div><div class="flex-1"><div class="skeleton h-4 w-2/3 mb-2"></div><div class="skeleton h-3 w-1/3"></div></div></div>
        </div>

        <div id="emptyState" class="hidden text-center py-20">
            <i data-lucide="file-text" class="w-16 h-16 text-lyric-light mx-auto mb-4"></i>
            <p class="text-lyric-secondary text-lg">Belum ada lirik</p>
            <p class="text-lyric-light text-sm mt-1">Lirik akan muncul setelah ditambahkan oleh staff.</p>
        </div>
    </main>

    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyB5tXCot1h83ZePjiX3kVvYfO0bDs8teSs",
            authDomain: "dwellidoki-cb4cd.firebaseapp.com",
            projectId: "dwellidoki-cb4cd",
            storageBucket: "dwellidoki-cb4cd.firebasestorage.app",
            messagingSenderId: "677449362018",
            appId: "1:677449362018:web:834f81d2f55c27b139ff3b",
            measurementId: "G-MLGPGY8Y1G"
        });
        const db = firebase.firestore();
        let allSongs = [];
        let activeIndex = -1;

        lucide.createIcons();

        function getVideoId(url) {
            if (!url) return null;
            const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
            return m ? m[1] : null;
        }

        function formatDate(d) {
            if (!d) return '-';
            const date = new Date(d);
            if (isNaN(date)) return d;
            return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function copyLyrics(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('Lirik berhasil disalin!');
            }).catch(() => {
                // Fallback
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('Lirik berhasil disalin!');
            });
        }

        function toggleSong(index) {
            if (activeIndex === index) {
                // Close
                const panel = document.getElementById('detail-' + index);
                const item = document.getElementById('item-' + index);
                panel.classList.remove('open');
                item.classList.remove('active');
                activeIndex = -1;
                return;
            }

            // Close previous
            if (activeIndex >= 0) {
                const prevPanel = document.getElementById('detail-' + activeIndex);
                const prevItem = document.getElementById('item-' + activeIndex);
                if (prevPanel) prevPanel.classList.remove('open');
                if (prevItem) prevItem.classList.remove('active');
            }

            activeIndex = index;
            const panel = document.getElementById('detail-' + index);
            const item = document.getElementById('item-' + index);
            item.classList.add('active');

            // Small delay for smooth animation
            requestAnimationFrame(() => {
                panel.classList.add('open');
                // Scroll to the panel
                setTimeout(() => {
                    item.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);
            });
        }

        function renderSongs(songs) {
            const list = document.getElementById('songList');
            const empty = document.getElementById('emptyState');

            if (!songs.length) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                lucide.createIcons();
                return;
            }

            empty.classList.add('hidden');
            list.innerHTML = songs.map((s, i) => {
                const vid = getVideoId(s.youtubeLink);
                return `
                    <div>
                        <div id="item-${i}" class="song-item bg-white rounded-xl p-4 flex items-center gap-4 border border-lyric-border/50" onclick="toggleSong(${i})">
                            <img src="${s.imageUrl || 'https://picsum.photos/seed/lyric'+i+'/128/128'}" alt="${s.title}" class="w-16 h-16 rounded-lg object-cover flex-shrink-0 bg-lyric-box-bg" onerror="this.src='https://picsum.photos/seed/err'+i+'/128/128'">
                            <div class="flex-1 min-w-0">
                                <h3 class="text-sm font-medium text-lyric-text truncate">${s.title || 'Tanpa Judul'}</h3>
                                <div class="flex items-center gap-3 mt-1">
                                    ${s.duration ? `<span class="text-xs text-lyric-secondary flex items-center gap-1"><i data-lucide="clock" class="w-3 h-3"></i>${s.duration}</span>` : ''}
                                    ${s.producer ? `<span class="text-xs text-lyric-light">${s.producer}</span>` : ''}
                                </div>
                            </div>
                            <div class="flex-shrink-0 text-lyric-light transition-transform duration-300" id="chevron-${i}" style="transform:rotate(0deg)">
                                <i data-lucide="chevron-down" class="w-5 h-5"></i>
                            </div>
                        </div>

                        <div id="detail-${i}" class="detail-panel">
                            <div class="bg-white rounded-b-xl border border-t-0 border-lyric-border/50 px-4 sm:px-6 pb-6 pt-4 fade-in">
                                
                                <!-- Meta Grid -->
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-y-4 gap-x-8 mb-6">
                                    <div>
                                        <p class="text-xs text-lyric-light uppercase tracking-wider mb-1">Nama Musik</p>
                                        <p class="text-sm text-lyric-text font-medium">${s.title || '-'}</p>
                                    </div>
                                    <div>
                                        <p class="text-xs text-lyric-light uppercase tracking-wider mb-1">Link YouTube</p>
                                        ${s.youtubeLink ? 
                                            (vid ? `<a href="${s.youtubeLink}" target="_blank" class="text-sm text-lyric-accent-dark hover:text-lyric-accent flex items-center gap-1 transition-colors"><i data-lucide="external-link" class="w-3.5 h-3.5"></i>Buka di YouTube</a>` :
                                            `<a href="${s.youtubeLink}" target="_blank" class="text-sm text-lyric-accent-dark hover:text-lyric-accent truncate block transition-colors">${s.youtubeLink}</a>`)
                                            : '<p class="text-sm text-lyric-secondary">-</p>'}
                                    </div>
                                    <div>
                                        <p class="text-xs text-lyric-light uppercase tracking-wider mb-1">Durasi</p>
                                        <p class="text-sm text-lyric-text">${s.duration || '-'}</p>
                                    </div>
                                    <div>
                                        <p class="text-xs text-lyric-light uppercase tracking-wider mb-1">Tanggal Rilis</p>
                                        <p class="text-sm text-lyric-text">${formatDate(s.releaseDate)}</p>
                                    </div>
                                    <div>
                                        <p class="text-xs text-lyric-light uppercase tracking-wider mb-1">Tanggal Entri Pertama</p>
                                        <p class="text-sm text-lyric-text">${formatDate(s.firstEntryDate)}</p>
                                    </div>
                                    <div>
                                        <p class="text-xs text-lyric-light uppercase tracking-wider mb-1">Posisi Masuk Pertama</p>
                                        <p class="text-sm text-lyric-text">${s.firstEntryPosition || '-'}</p>
                                    </div>
                                    <div>
                                        <p class="text-xs text-lyric-light uppercase tracking-wider mb-1">Produsen</p>
                                        <p class="text-sm text-lyric-text">${s.producer || '-'}</p>
                                    </div>
                                    <div>
                                        <p class="text-xs text-lyric-light uppercase tracking-wider mb-1">Penulis Lagu</p>
                                        <p class="text-sm text-lyric-text">${s.songWriter || '-'}</p>
                                    </div>
                                    <div class="sm:col-span-2">
                                        <p class="text-xs text-lyric-light uppercase tracking-wider mb-1">Sumber</p>
                                        <p class="text-sm text-lyric-text">${s.source || '-'}</p>
                                    </div>
                                </div>

                                ${vid ? `
                                <!-- YouTube Embed -->
                                <div class="mb-6 rounded-xl overflow-hidden border border-lyric-border">
                                    <div class="aspect-video bg-black">
                                        <iframe src="https://www.youtube.com/embed/${vid}" class="w-full h-full" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                                    </div>
                                </div>
                                ` : ''}

                                ${s.lyrics ? `
                                <!-- Lyrics Box -->
                                <div>
                                    <div class="flex items-center justify-between mb-3">
                                        <div class="flex items-center gap-2">
                                            <div class="w-1 h-5 bg-lyric-accent rounded-full"></div>
                                            <p class="text-sm font-medium text-lyric-text">Lirik</p>
                                        </div>
                                        <button onclick="event.stopPropagation();copyLyrics(${JSON.stringify(s.lyrics.replace(/`/g, '\\`').replace(/\\/g, '\\\\'))})" class="flex items-center gap-1.5 text-xs text-lyric-secondary hover:text-lyric-accent-dark transition-colors px-3 py-1.5 rounded-full border border-lyric-border hover:border-lyric-accent">
                                            <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                            Salin Lirik
                                        </button>
                                    </div>
                                    <div class="lyrics-scroll bg-lyric-box-bg rounded-xl border border-lyric-border p-5 max-h-[400px] overflow-y-auto">
                                        <pre class="text-sm text-lyric-text leading-relaxed whitespace-pre-wrap font-roboto">${s.lyrics}</pre>
                                    </div>
                                </div>
                                ` : `
                                <div class="bg-lyric-box-bg rounded-xl border border-lyric-border p-8 text-center">
                                    <i data-lucide="file-text" class="w-8 h-8 text-lyric-light mx-auto mb-2"></i>
                                    <p class="text-sm text-lyric-light">Lirik belum tersedia</p>
                                </div>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            lucide.createIcons();

            // Observe detail panels to rotate chevrons
            songs.forEach((_, i) => {
                const panel = document.getElementById('detail-' + i);
                const chevron = document.getElementById('chevron-' + i);
                if (panel && chevron) {
                    const observer = new MutationObserver(() => {
                        chevron.style.transform = panel.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
                    });
                    observer.observe(panel, { attributes: true, attributeFilter: ['class'] });
                }
            });
        }

        // Fetch songs
        db.collection('songs').orderBy('createdAt', 'desc').get().then(snap => {
            allSongs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderSongs(allSongs);
        }).catch(err => {
            console.error(err);
            document.getElementById('songList').innerHTML = `<div class="text-center py-12"><p class="text-red-400 text-sm">Gagal memuat data. Pastikan aturan Firestore mengizinkan pembacaan.</p></div>`;
        });

        let toastTimeout;
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
