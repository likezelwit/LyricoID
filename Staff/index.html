<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyric.o - Staff Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'roboto': ['Roboto', 'sans-serif'] },
                    colors: {
                        'yt-red': '#FF0000', 'yt-text': '#0f0f0f',
                        'yt-text-secondary': '#606060', 'yt-text-light': '#909090',
                        'yt-bg': '#f9f9f9', 'yt-border': '#e5e5e5',
                        'yt-hover': '#f2f2f2', 'yt-icon': '#030303',
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #f9f9f9; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #909090; border-radius: 4px; }
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #323232; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 9999; transition: transform 0.3s ease; pointer-events: none; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .form-input { width: 100%; padding: 8px 12px; border: 1px solid #e5e5e5; border-radius: 6px; font-size: 14px; outline: none; transition: border-color 0.15s; font-family: 'Roboto', sans-serif; }
        .form-input:focus { border-color: #065fd4; box-shadow: 0 0 0 1px #065fd4; }
        .form-label { display: block; font-size: 13px; color: #606060; margin-bottom: 4px; font-weight: 500; }
        .btn-primary { background: #065fd4; color: #fff; padding: 8px 20px; border-radius: 20px; font-size: 14px; font-weight: 500; border: none; cursor: pointer; transition: background 0.15s; font-family: 'Roboto', sans-serif; }
        .btn-primary:hover { background: #0550b5; }
        .btn-secondary { background: #f2f2f2; color: #0f0f0f; padding: 8px 20px; border-radius: 20px; font-size: 14px; font-weight: 500; border: none; cursor: pointer; transition: background 0.15s; font-family: 'Roboto', sans-serif; }
        .btn-secondary:hover { background: #e5e5e5; }
        .btn-danger { background: transparent; color: #f44336; padding: 6px 12px; border-radius: 20px; font-size: 13px; border: 1px solid #f44336; cursor: pointer; transition: all 0.15s; font-family: 'Roboto', sans-serif; }
        .btn-danger:hover { background: #f44336; color: #fff; }
        .btn-edit { background: transparent; color: #065fd4; padding: 6px 12px; border-radius: 20px; font-size: 13px; border: 1px solid #065fd4; cursor: pointer; transition: all 0.15s; font-family: 'Roboto', sans-serif; }
        .btn-edit:hover { background: #065fd4; color: #fff; }
        .table-row { transition: background 0.15s; }
        .table-row:hover { background: #f9f9f9; }
        .delete-confirm { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: none; align-items: center; justify-content: center; }
        .delete-confirm.open { display: flex; }
    </style>
</head>
<body class="font-roboto">

    <div id="toast" class="toast"></div>

    <!-- Delete Confirmation -->
    <div id="deleteConfirm" class="delete-confirm" onclick="if(event.target===this)closeDeleteConfirm()">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full mx-4 text-center">
            <div class="w-14 h-14 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="trash-2" class="w-7 h-7 text-red-500"></i>
            </div>
            <h3 class="text-lg font-medium text-yt-text mb-2">Hapus Lagu?</h3>
            <p class="text-sm text-yt-text-secondary mb-6">Tindakan ini tidak dapat dibatalkan.</p>
            <div class="flex gap-3 justify-center">
                <button onclick="closeDeleteConfirm()" class="btn-secondary">Batal</button>
                <button onclick="confirmDelete()" class="btn-primary" style="background:#f44336" onmouseover="this.style.background='#d32f2f'" onmouseout="this.style.background='#f44336'">Hapus</button>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-white border-b border-yt-border h-14 flex items-center px-6 sticky top-0 z-50">
        <a href="../index.html" class="flex items-center gap-2 text-yt-text no-underline hover:opacity-80 transition-opacity">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
            <span class="font-medium text-sm">Kembali ke Channel</span>
        </a>
        <div class="flex-1"></div>
        <div class="flex items-center gap-2">
            <img src="https://i.ibb.co.com/W8JL1vD/Gemini-Generated-Image-zeyj46zeyj46zeyj.png" class="w-8 h-8 rounded-full object-cover">
            <span class="text-sm font-medium text-yt-text">Staff Panel</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6">
        <!-- Toggle Form Button -->
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-normal text-yt-text">Kelola Lagu</h1>
            <button id="toggleFormBtn" onclick="toggleForm()" class="btn-primary flex items-center gap-2">
                <i data-lucide="plus" class="w-4 h-4"></i>
                <span id="toggleFormText">Tambah Lagu</span>
            </button>
        </div>

        <!-- Form -->
        <div id="formPanel" class="bg-white rounded-xl border border-yt-border mb-6 overflow-hidden" style="max-height:0;opacity:0;transition:max-height 0.4s ease, opacity 0.3s ease, margin 0.3s ease; margin-bottom:0;">
            <div class="p-6">
                <h2 id="formTitle" class="text-lg font-medium text-yt-text mb-5">Tambah Lagu Baru</h2>
                <form id="songForm" onsubmit="handleSubmit(event)">
                    <input type="hidden" id="editId" value="">

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="sm:col-span-2">
                            <label class="form-label">URL Gambar *</label>
                            <input type="url" id="f_imageUrl" class="form-input" placeholder="https://example.com/image.jpg" required>
                            <p class="text-xs text-yt-text-light mt-1">Tempel link gambar (Imgur, DLL)</p>
                        </div>
                        <div class="sm:col-span-2">
                            <label class="form-label">Nama Musik *</label>
                            <input type="text" id="f_title" class="form-input" placeholder="Judul lagu" required>
                        </div>
                        <div>
                            <label class="form-label">Link YouTube</label>
                            <input type="url" id="f_youtubeLink" class="form-input" placeholder="https://youtube.com/watch?v=...">
                        </div>
                        <div>
                            <label class="form-label">Durasi</label>
                            <input type="text" id="f_duration" class="form-input" placeholder="3:45">
                        </div>
                        <div>
                            <label class="form-label">Tanggal Rilis</label>
                            <input type="date" id="f_releaseDate" class="form-input">
                        </div>
                        <div>
                            <label class="form-label">Tanggal Entri Pertama</label>
                            <input type="date" id="f_firstEntryDate" class="form-input">
                        </div>
                        <div>
                            <label class="form-label">Posisi Masuk Pertama</label>
                            <input type="number" id="f_firstEntryPosition" class="form-input" placeholder="1">
                        </div>
                        <div>
                            <label class="form-label">Produsen</label>
                            <input type="text" id="f_producer" class="form-input" placeholder="Nama produsen">
                        </div>
                        <div>
                            <label class="form-label">Penulis Lagu</label>
                            <input type="text" id="f_songWriter" class="form-input" placeholder="Nama penulis">
                        </div>
                        <div>
                            <label class="form-label">Sumber</label>
                            <input type="text" id="f_source" class="form-input" placeholder="Sumber lirik/data">
                        </div>
                        <div class="sm:col-span-2">
                            <label class="form-label">Lirik</label>
                            <textarea id="f_lyrics" class="form-input" rows="8" placeholder="Tulis lirik di sini..." style="resize:vertical;min-height:120px;"></textarea>
                        </div>
                    </div>

                    <div class="flex gap-3 mt-6">
                        <button type="submit" class="btn-primary" id="submitBtn">Simpan</button>
                        <button type="button" onclick="resetForm();toggleForm()" class="btn-secondary">Batal</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-xl border border-yt-border overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b border-yt-border bg-yt-bg">
                            <th class="text-left py-3 px-4 font-medium text-yt-text-secondary">Gambar</th>
                            <th class="text-left py-3 px-4 font-medium text-yt-text-secondary">Nama Musik</th>
                            <th class="text-left py-3 px-4 font-medium text-yt-text-secondary hidden md:table-cell">Durasi</th>
                            <th class="text-left py-3 px-4 font-medium text-yt-text-secondary hidden lg:table-cell">Tanggal Rilis</th>
                            <th class="text-left py-3 px-4 font-medium text-yt-text-secondary hidden lg:table-cell">Produsen</th>
                            <th class="text-right py-3 px-4 font-medium text-yt-text-secondary">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="songTable">
                        <tr><td colspan="6" class="py-12 text-center text-yt-text-light">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <p class="text-xs text-yt-text-light text-center mt-6">Lyric.o Staff Dashboard — Data disimpan di Firebase Firestore</p>
    </main>

    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyB5tXCot1h83ZePjiX3kVvYfO0bDs8teSs",
            authDomain: "dwellidoki-cb4cd.firebaseapp.com",
            projectId: "dwellidoki-cb4cd",
            storageBucket: "dwellidoki-cb4cd.firebasestorage.app",
            messagingSenderId: "677449362018",
            appId: "1:677449362018:web:834f81d2f55c27b139ff3b",
            measurementId: "G-MLGPGY8Y1G"
        });
        const db = firebase.firestore();
        let deleteTargetId = null;

        lucide.createIcons();

        // Form toggle
        let formOpen = false;
        function toggleForm() {
            const panel = document.getElementById('formPanel');
            const text = document.getElementById('toggleFormText');
            formOpen = !formOpen;
            if (formOpen) {
                panel.style.maxHeight = '1200px';
                panel.style.opacity = '1';
                panel.style.marginBottom = '24px';
                text.textContent = 'Tutup Form';
            } else {
                panel.style.maxHeight = '0';
                panel.style.opacity = '0';
                panel.style.marginBottom = '0';
                text.textContent = 'Tambah Lagu';
                resetForm();
            }
        }

        function resetForm() {
            document.getElementById('songForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('formTitle').textContent = 'Tambah Lagu Baru';
            document.getElementById('submitBtn').textContent = 'Simpan';
        }

        function fillForm(data) {
            document.getElementById('editId').value = data.id;
            document.getElementById('f_imageUrl').value = data.imageUrl || '';
            document.getElementById('f_title').value = data.title || '';
            document.getElementById('f_youtubeLink').value = data.youtubeLink || '';
            document.getElementById('f_duration').value = data.duration || '';
            document.getElementById('f_releaseDate').value = data.releaseDate || '';
            document.getElementById('f_firstEntryDate').value = data.firstEntryDate || '';
            document.getElementById('f_firstEntryPosition').value = data.firstEntryPosition || '';
            document.getElementById('f_producer').value = data.producer || '';
            document.getElementById('f_songWriter').value = data.songWriter || '';
            document.getElementById('f_source').value = data.source || '';
            document.getElementById('f_lyrics').value = data.lyrics || '';
            document.getElementById('formTitle').textContent = 'Edit Lagu';
            document.getElementById('submitBtn').textContent = 'Perbarui';
            if (!formOpen) toggleForm();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function handleSubmit(e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const data = {
                imageUrl: document.getElementById('f_imageUrl').value.trim(),
                title: document.getElementById('f_title').value.trim(),
                youtubeLink: document.getElementById('f_youtubeLink').value.trim(),
                duration: document.getElementById('f_duration').value.trim(),
                releaseDate: document.getElementById('f_releaseDate').value,
                firstEntryDate: document.getElementById('f_firstEntryDate').value,
                firstEntryPosition: document.getElementById('f_firstEntryPosition').value,
                producer: document.getElementById('f_producer').value.trim(),
                songWriter: document.getElementById('f_songWriter').value.trim(),
                source: document.getElementById('f_source').value.trim(),
                lyrics: document.getElementById('f_lyrics').value,
            };

            if (editId) {
                db.collection('songs').doc(editId).update(data).then(() => {
                    showToast('Lagu berhasil diperbarui');
                    resetForm();
                    if (formOpen) toggleForm();
                }).catch(err => showToast('Gagal: ' + err.message));
            } else {
                data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                db.collection('songs').add(data).then(() => {
                    showToast('Lagu berhasil ditambahkan');
                    resetForm();
                    if (formOpen) toggleForm();
                }).catch(err => showToast('Gagal: ' + err.message));
            }
        }

        function editSong(id) {
            db.collection('songs').doc(id).get().then(doc => {
                if (doc.exists) fillForm({ id: doc.id, ...doc.data() });
            });
        }

        function openDeleteConfirm(id) {
            deleteTargetId = id;
            document.getElementById('deleteConfirm').classList.add('open');
        }
        function closeDeleteConfirm() {
            deleteTargetId = null;
            document.getElementById('deleteConfirm').classList.remove('open');
        }
        function confirmDelete() {
            if (!deleteTargetId) return;
            db.collection('songs').doc(deleteTargetId).delete().then(() => {
                showToast('Lagu berhasil dihapus');
                closeDeleteConfirm();
            }).catch(err => showToast('Gagal: ' + err.message));
        }

        function formatDate(d) {
            if (!d) return '-';
            const date = new Date(d);
            if (isNaN(date)) return d;
            return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        // Real-time listener
        db.collection('songs').orderBy('createdAt', 'desc').onSnapshot(snap => {
            const table = document.getElementById('songTable');
            if (snap.empty) {
                table.innerHTML = '<tr><td colspan="6" class="py-12 text-center text-yt-text-light">Belum ada lagu. Klik "Tambah Lagu" untuk memulai.</td></tr>';
                return;
            }
            table.innerHTML = snap.docs.map(doc => {
                const s = doc.data();
                return `
                    <tr class="table-row border-b border-yt-border last:border-0">
                        <td class="py-3 px-4">
                            <img src="${s.imageUrl || 'https://picsum.photos/seed/thumb/80/45'}" class="w-20 h-[45px] object-cover rounded-md bg-yt-bg" onerror="this.src='https://picsum.photos/seed/err/80/45'">
                        </td>
                        <td class="py-3 px-4">
                            <p class="font-medium text-yt-text line-clamp-2">${s.title || '-'}</p>
                            ${s.songWriter ? `<p class="text-xs text-yt-text-light mt-0.5">${s.songWriter}</p>` : ''}
                        </td>
                        <td class="py-3 px-4 text-yt-text-secondary hidden md:table-cell">${s.duration || '-'}</td>
                        <td class="py-3 px-4 text-yt-text-secondary hidden lg:table-cell">${formatDate(s.releaseDate)}</td>
                        <td class="py-3 px-4 text-yt-text-secondary hidden lg:table-cell">${s.producer || '-'}</td>
                        <td class="py-3 px-4 text-right whitespace-nowrap">
                            <button onclick="editSong('${doc.id}')" class="btn-edit mr-1">Edit</button>
                            <button onclick="openDeleteConfirm('${doc.id}')" class="btn-danger">Hapus</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }, err => {
            console.error(err);
            document.getElementById('songTable').innerHTML = `<tr><td colspan="6" class="py-12 text-center text-red-500">Gagal memuat data. Pastikan aturan Firestore mengizinkan baca/tulis.</td></tr>`;
        });

        let toastTimeout;
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
